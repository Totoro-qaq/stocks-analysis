version: 2
updates:
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: monthly
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      python-patches:
        update-types:
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: monthly
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-patches:
        update-types:
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
